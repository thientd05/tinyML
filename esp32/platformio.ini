; ESP32-WROOM-32 benchmark: all four `tiny` ECG models in one firmware.
; Headers are generated by tools/export_esp32.py (run from repo root first).
;
;   pio run                        # build (prints Flash/RAM usage)
;   pio run -t upload              # flash to the board (hold BOOT during "Connecting...")
;   ../env/bin/python ../tools/read_serial.py /dev/ttyUSB0 7   # capture the benchmark output

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -O2
board_build.partitions = huge_app.csv   ; 3 MB app partition: 16 models + data don't fit the default 1.3 MB
