; ESP32-WROOM-32 benchmark for the 6-family ECG model sweep (~36 variants).
; Headers are generated by tools/export_esp32.py (run from repo root first).
;
; FLASH SPLIT — all 36 models' weights are ~4.2 MB and do NOT fit the 3 MB huge_app app
; partition (the original 4-family firmware already sat at 3.00/3.00 MB). The sweep is
; therefore built as TWO groups, balanced on measured weight footprint:
;
;   group_a: rf (1682 KB) + svm (247 KB) + lstm (86 KB)    ~2.0 MB weights
;   group_b: xgb (964 KB) + cnn (564 KB) + crnn (160 KB)   ~1.7 MB weights
;
; Both groups keep every model's GLOBAL index into Y_PC, so the parity column stays valid.
; Flash each in turn and append its serial output to esp32/benchmark_sweep.txt; analyze.py
; reads the union of the two tables.
;
;   pio run -e group_a -t upload      # hold BOOT during "Connecting..."
;   ../env/bin/python ../tools/read_serial.py /dev/ttyUSB0 90 "loop idle"   # >> benchmark_sweep.txt
;   pio run -e group_b -t upload
;   ../env/bin/python ../tools/read_serial.py /dev/ttyUSB0 90 "loop idle"   # >> benchmark_sweep.txt
;
; If a group overflows after a sweep change, move a family across — the -DINC_* flags are
; the only thing selecting what gets compiled in.

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv   ; 3 MB app partition (default 1.3 MB is far too small)

[env:group_a]
build_flags = -O2 -DINC_RF -DINC_SVM -DINC_LSTM

[env:group_b]
build_flags = -O2 -DINC_XGB -DINC_CNN -DINC_CRNN
